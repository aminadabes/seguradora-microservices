spring.application.name=contratacao-service
server.port=8082

# H2 Database configuration (Default)
spring.datasource.url=jdbc:h2:mem:contratacaodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway Config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# RabbitMQ Config
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Internal Proposta Service URL
app.proposta-service.url=http://localhost:8081

# Logging Pattern (includes Correlation-ID if present in MDC)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [Correlation-ID: %X{correlationId:-none}] - %msg%n
logging.level.com.seguradora=INFO
